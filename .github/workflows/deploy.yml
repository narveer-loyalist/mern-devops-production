name: MERN DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./server
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest


    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./public
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest


    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3


    - name: Fetch EC2 IP from Terraform Output
      run: |
        cd terraform
        terraform init
        echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV


    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd mern-devops-project
          kubectl rollout restart deployment backend
          kubectl rollout restart deployment frontend