name: MERN DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4


    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./server
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest


    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./public
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest


    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3


    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Get EC2 Public IP
      run: |
        EC2_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=mern-devops-instance" --query "Reservations[].Instances[].PublicIpAddress" --output text)
        echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV


    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd mern-devops-project
          kubectl rollout restart deployment backend
          kubectl rollout restart deployment frontend